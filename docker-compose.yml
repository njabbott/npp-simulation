services:
  rba-sim:
    build:
      context: .
      dockerfile: docker/Dockerfile.rba-sim
    image: rba-sim:local
    container_name: rba-sim
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      SERVER_SERVLET_CONTEXT_PATH: /rba-sim
      NPP_CALLBACK_BASE_URL: http://npp-demo:8082/npp-simulation
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75.0
    restart: unless-stopped

  npp-demo:
    build:
      context: .
      dockerfile: docker/Dockerfile.npp-demo
    image: npp-demo:local
    container_name: npp-demo
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      SERVER_SERVLET_CONTEXT_PATH: /npp-simulation
      RBA_SIM_BASE_URL: http://rba-sim:8081/rba-sim
      NPP_CALLBACK_BASE_URL: http://npp-demo:8082/npp-simulation
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75.0
    depends_on:
      - rba-sim
    restart: unless-stopped
